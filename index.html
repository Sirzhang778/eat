            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
        }

        /* ========== 主容器 ========== */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(33, 150, 243, 0.12);
            text-align: center;
        }

        /* ========== 标题区域 ========== */
        .header {
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
        }

        .header .icon {
            font-size: 56px;
            display: block;
            margin: 0 auto 8px auto;
            line-height: 1;
        }

        .header h1 {
            font-size: 28px;
            color: #1565c0;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            margin: 0 auto;
        }

        .header .subtitle {
            font-size: 14px;
            color: #64b5f6;
            margin-top: 6px;
            letter-spacing: 1px;
            text-align: center;
        }

        /* ========== 三个餐别按钮卡片 ========== */
        .meal-cards {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .meal-card {
            flex: 1;
            min-width: 110px;
            max-width: 150px;
            padding: 24px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: linear-gradient(145deg, #e3f2fd, #bbdefb);
            box-shadow: 0 4px 16px rgba(33, 150, 243, 0.10);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #1565c0;
            font-family: inherit;
        }

        .meal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(33, 150, 243, 0.22);
            background: linear-gradient(145deg, #bbdefb, #90caf9);
        }

        .meal-card:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.15);
        }

        .meal-card.active {
            background: linear-gradient(145deg, #42a5f5, #1e88e5);
            color: #fff;
            box-shadow: 0 8px 28px rgba(30, 136, 229, 0.35);
        }

        .meal-card .meal-emoji {
            font-size: 36px;
        }

        .meal-card .meal-label {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .meal-card .meal-hint {
            font-size: 12px;
            opacity: 0.7;
        }

        /* ========== 结果展示区域 ========== */
        .result-area {
            background: linear-gradient(145deg, #f0f8ff, #e8f0fe);
            border-radius: 20px;
            padding: 32px 24px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 2px dashed transparent;
        }

        .result-area.has-result {
            border-color: #90caf9;
            background: linear-gradient(145deg, #e3f2fd, #f0f8ff);
        }

        .result-placeholder {
            color: #90caf9;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .result-placeholder .placeholder-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }

        .result-content {
            display: none;
            width: 100%;
        }

        .result-content.show {
            display: block;
        }

        .result-dish {
            font-size: 32px;
            font-weight: 700;
            color: #0d47a1;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .result-restaurant {
            display: inline-block;
            font-size: 15px;
            color: #fff;
            background: linear-gradient(135deg, #64b5f6, #42a5f5);
            padding: 6px 18px;
            border-radius: 20px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .result-meal-tag {
            display: inline-block;
            font-size: 12px;
            color: #64b5f6;
            background: rgba(100, 181, 246, 0.12);
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        /* ========== 换一个按钮 ========== */
        .btn-refresh {
            display: none;
            margin-top: 20px;
            padding: 12px 32px;
            border-radius: 30px;
            border: 2px solid #64b5f6;
            background: #fff;
            color: #1e88e5;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .btn-refresh.show {
            display: inline-block;
        }

        .btn-refresh:hover {
            background: #e3f2fd;
            border-color: #1e88e5;
            transform: scale(1.04);
        }

        .btn-refresh:active {
            transform: scale(0.97);
        }

        /* ========== 底部信息 ========== */
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #90caf9;
            letter-spacing: 1px;
        }

        .footer-note {
            margin-top: 6px;
            font-size: 11px;
            color: #b0bec5;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 20px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            }

            .meal-card .meal-label {
                font-size: 15px;
            }

            .result-dish {
                font-size: 26px;
            }

            .result-area {
                padding: 24px 16px;
            }
        }
    </style>
</head>

                { name: "羊杂汤", restaurant: "台湾餐厅" },
                { name: "牛肉面", restaurant: "台湾餐厅" },
                { name: "小炒", restaurant: "台湾餐厅" },
            ],
        };

        // 餐别中文名映射
        const mealNames = {
            breakfast: "早餐",
            lunch: "午餐",
            dinner: "晚餐",
        };

        // 记录上次结果，避免连续重复
        let lastResult = {
            breakfast: null,
            lunch: null,
            dinner: null,
        };

        let currentMeal = null;

        // =============================================
        // 核心函数：随机挑选一道菜
        // =============================================
        function pickMeal(mealType) {
            const list = menuData[mealType];
            if (!list || list.length === 0) return;

            // 随机选，但避免与上一次重复（如果有多于1个选项）
            let index;
            if (list.length === 1) {
                index = 0;
            } else {
                do {
                    index = Math.floor(Math.random() * list.length);
                } while (list[index] === lastResult[mealType] && list.length > 1);
            }

            const picked = list[index];
            lastResult[mealType] = picked;
            currentMeal = mealType;

            // 更新 UI - 高亮当前按钮
            document.querySelectorAll(".meal-card").forEach(btn => btn.classList.remove("active"));
            document.getElementById("btn-" + mealType).classList.add("active");

            // 显示结果
            displayResult(picked, mealType);
        }

        // =============================================
        // 显示结果
        // =============================================
        function displayResult(dish, mealType) {
            const resultArea = document.getElementById("resultArea");
            const placeholder = document.getElementById("placeholder");
            const resultContent = document.getElementById("resultContent");
            const resultDish = document.getElementById("resultDish");
            const resultRestaurant = document.getElementById("resultRestaurant");
            const resultMealTag = document.getElementById("resultMealTag");
            const btnRefresh = document.getElementById("btnRefresh");

            // 隐藏占位文字，显示结果
            placeholder.style.display = "none";
            resultContent.classList.add("show");
            resultArea.classList.add("has-result");
            btnRefresh.classList.add("show");

            // 填入内容
            resultMealTag.textContent = mealNames[mealType];
            resultDish.textContent = dish.name;
            resultRestaurant.textContent = "📍 " + dish.restaurant;

            // 添加小动画：结果区域轻微弹跳
            resultContent.style.animation = "none";
            resultContent.offsetHeight; // 触发回流
            resultContent.style.animation = "popIn 0.35s ease-out";
        }

        // =============================================
        // 换一个（在同餐别内重新随机）
        // =============================================
        function reroll() {
            if (!currentMeal) return;
            pickMeal(currentMeal);
        }

        // =============================================
        // 添加弹出动画样式
        // =============================================
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes popIn {
                0%   { transform: scale(0.85); opacity: 0; }
                60%  { transform: scale(1.04); opacity: 1; }
                100% { transform: scale(1);    opacity: 1; }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>

</body>
</html>
